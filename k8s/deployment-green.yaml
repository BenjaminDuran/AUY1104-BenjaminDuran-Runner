# Deployment del color GREEN.
#
# Copia exacta de deployment-blue.yaml, cambiando `blue` por `green`. Ambos
# colores conviven en el clúster al mismo tiempo; quién recibe tráfico lo decide
# el selector del Service (ver service.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api-green
  labels:
    app: demo-api
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
      version: green
  template:
    metadata:
      labels:
        app: demo-api
        version: green
    spec:
      containers:
        - name: api
          image: bvnjitsss/demo-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: RELEASE_COLOR
              value: "green"
            - name: APP_VERSION
              value: "dev"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
